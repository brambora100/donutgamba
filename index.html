<!DOCTYPE html>
<html lang="cs">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>DonutGamba | Professional System</title>
    
    <script src="https://www.gstatic.com/firebasejs/10.7.1/firebase-app-compat.js"></script>
    <script src="https://www.gstatic.com/firebasejs/10.7.1/firebase-firestore-compat.js"></script>
    
    <link href="https://fonts.googleapis.com/css2?family=Plus+Jakarta+Sans:wght@400;600;700;800&display=swap" rel="stylesheet">
    
    <style>
        :root {
            --accent: #2ecc71;
            --accent-glow: rgba(46, 204, 113, 0.4);
            --bg: #03060a;
            --panel: #0d131c;
            --input-bg: #141b26;
            --border: #1e2632;
            --text-main: #ffffff;
            --text-dim: #94a3b8;
            --red: #e74c3c;
            --gold: #f1c40f;
        }

        * { margin: 0; padding: 0; box-sizing: border-box; outline: none; }
        body { 
            background: var(--bg); 
            color: var(--text-main); 
            font-family: 'Plus Jakarta Sans', sans-serif; 
            height: 100vh; 
            display: flex; 
            flex-direction: column;
            overflow: hidden;
        }

        nav {
            height: 70px; padding: 0 30px; display: flex; align-items: center; justify-content: space-between;
            background: var(--panel); border-bottom: 1px solid var(--border); z-index: 100;
        }

        .logo { font-size: 22px; font-weight: 900; letter-spacing: -1px; }
        .logo span { color: var(--accent); }

        .user-status { display: flex; align-items: center; gap: 15px; }
        .user-badge {
            display: flex; align-items: center; gap: 10px;
            background: var(--input-bg); padding: 6px 14px;
            border-radius: 10px; border: 1px solid var(--border);
        }
        .user-badge img { width: 28px; height: 28px; border-radius: 4px; }
        .user-badge .balance { font-weight: 800; color: var(--accent); }

        .wallet-icon-btn {
            background: none; border: none; cursor: pointer; font-size: 20px;
            display: flex; align-items: center; transition: transform 0.2s;
        }
        .wallet-icon-btn:hover { transform: scale(1.1); }

        #wallet-modal {
            position: fixed; inset: 0; background: rgba(0,0,0,0.85);
            display: none; align-items: center; justify-content: center; z-index: 3000;
        }
        .modal-content {
            background: var(--panel); padding: 30px; border-radius: 24px;
            width: 380px; border: 1px solid var(--border); text-align: center;
        }
        .wager-section { margin: 20px 0; text-align: left; }
        .wager-info { display: flex; justify-content: space-between; font-size: 12px; font-weight: 800; margin-bottom: 8px; }
        .wager-bar-bg { height: 10px; background: var(--input-bg); border-radius: 10px; border: 1px solid var(--border); overflow: hidden; }
        .wager-bar-fill { height: 100%; background: var(--accent); width: 0%; transition: width 0.5s ease; }

        .main-container { display: flex; flex: 1; width: 100%; }
        .sidebar { width: 380px; background: var(--panel); border-right: 1px solid var(--border); padding: 25px; display: flex; flex-direction: column; gap: 20px; overflow-y: auto; }
        .game-area { flex: 1; display: flex; align-items: center; justify-content: center; position: relative; background: radial-gradient(circle at center, #111b27 0%, var(--bg) 100%); }

        .mode-selector { display: flex; background: var(--input-bg); padding: 4px; border-radius: 14px; border: 1px solid var(--border); }
        .mode-tab { flex: 1; padding: 10px; border: none; background: transparent; color: var(--text-dim); font-weight: 800; font-size: 12px; text-transform: uppercase; cursor: pointer; border-radius: 10px; transition: 0.2s; }
        .mode-tab.active { background: var(--panel); color: white; box-shadow: 0 4px 10px rgba(0,0,0,0.2); }

        .input-group { display: flex; flex-direction: column; gap: 8px; }
        .label { font-size: 11px; font-weight: 800; color: var(--text-dim); text-transform: uppercase; letter-spacing: 1px; }
        select, input { background: var(--input-bg); border: 1px solid var(--border); padding: 14px; border-radius: 12px; color: white; font-weight: 600; width: 100%; }

        .spin-btn {
            background: var(--accent); color: white; border: none; padding: 18px; border-radius: 12px; font-weight: 900; font-size: 18px; cursor: pointer; transition: 0.3s;
            box-shadow: 0 8px 20px var(--accent-glow); text-transform: uppercase; width: 100%;
        }
        .spin-btn:disabled { background: #1a222d; box-shadow: none; color: #3d4b5c; cursor: not-allowed; }

        .wheel-wrap { position: relative; width: 550px; height: 550px; }
        .wheel-pointer { position: absolute; top: -15px; left: 50%; transform: translateX(-50%); width: 40px; height: 50px; background: white; clip-path: polygon(0 0, 100% 0, 50% 100%); z-index: 100; border: 2px solid #000; }
        canvas { width: 100%; height: 100%; border-radius: 50%; border: 12px solid var(--panel); box-shadow: 0 0 40px rgba(0,0,0,0.5); transition: transform 5s cubic-bezier(0.15, 0, 0.15, 1); }

        #result-overlay { position: absolute; inset: 0; pointer-events: none; display: flex; align-items: center; justify-content: center; z-index: 500; opacity: 0; transition: 0.4s; transform: scale(0.5); }
        #result-overlay.active { opacity: 1; transform: scale(1); }
        .result-card { padding: 40px 80px; border-radius: 30px; text-align: center; backdrop-filter: blur(10px); border: 2px solid rgba(255,255,255,0.1); }
        .result-card.win { background: rgba(46, 204, 113, 0.2); box-shadow: 0 0 100px rgba(46, 204, 113, 0.3); }
        .result-card.loss { background: rgba(231, 76, 60, 0.2); box-shadow: 0 0 100px rgba(231, 76, 60, 0.3); }

        #auth-screen { position: fixed; inset: 0; background: var(--bg); z-index: 2000; display: flex; align-items: center; justify-content: center; }
        .auth-card { background: var(--panel); padding: 40px; border-radius: 24px; width: 340px; text-align: center; border: 1px solid var(--border); }
    </style>
</head>
<body>

<div id="wallet-modal">
    <div class="modal-content">
        <h2>Wallet</h2>
        <div class="wager-section">
            <div class="wager-info"><span>WAGERED</span><span id="wager-val">$0 / $1,000,000</span></div>
            <div class="wager-bar-bg"><div id="wager-fill" class="wager-bar-fill"></div></div>
        </div>
        <input type="number" id="wallet-amt" placeholder="Amount (min 1000)">
        <div style="display:grid; grid-template-columns:1fr 1fr; gap:10px; margin-top:15px;">
            <button class="spin-btn" style="font-size:12px; padding:12px;" onclick="walletAction('deposit')">DEPOSIT ↓</button>
            <button class="spin-btn" style="font-size:12px; padding:12px; background:var(--red);" onclick="walletAction('withdraw')">WITHDRAW ↑</button>
        </div>
        <div id="deposit-instructions" style="display:none; margin-top:15px; padding:10px; background:#000; color:var(--gold); font-size:12px; border-radius:8px;"></div>
        <button onclick="toggleWallet()" style="margin-top: 20px; background: none; border: none; color: var(--text-dim); cursor: pointer;">Close</button>
    </div>
</div>

<div id="auth-screen">
    <div class="auth-card">
        <h1 class="logo" style="margin-bottom: 25px;">DONUT<span>GAMBA</span></h1>
        <input type="text" id="nick-in" placeholder="Minecraft Nickname">
        <button class="spin-btn" onclick="login()" style="margin-top:15px;">Enter Casino</button>
        <div id="v-code" style="display:none; margin-top:20px; padding:15px; background:#000; color:var(--accent); font-family:monospace; border-radius:10px; border:1px solid var(--border);"></div>
    </div>
</div>

<nav>
    <div class="logo">DONUT<span>GAMBA</span></div>
    <div class="user-status" id="user-ui" style="display:none;">
        <div class="user-badge">
            <img id="u-head" src="">
            <span class="balance" id="u-bal">0 $</span>
        </div>
        <button class="wallet-icon-btn" onclick="toggleWallet()">🗃️</button>
        <button onclick="logout()" style="background:none; border:none; color:var(--text-dim); cursor:pointer; font-weight: 700; font-size: 13px;">LOGOUT</button>
    </div>
</nav>

<div class="main-container">
    <aside class="sidebar">
        <div class="mode-selector">
            <button class="mode-tab active" id="tab-manual" onclick="setMode('manual')">Manual</button>
            <button class="mode-tab" id="tab-auto" onclick="setMode('auto')">Auto</button>
        </div>

        <div class="input-group">
            <label class="label">Wheel Segments</label>
            <select id="seg-sel" onchange="initWheel()">
                <option value="10">10 Segments</option>
                <option value="20" selected>20 Segments</option>
                <option value="30">30 Segments</option>
            </select>
        </div>

        <div class="input-group">
            <label class="label">Difficulty</label>
            <select id="diff-sel" onchange="initWheel()">
                <option value="easy">Easy (Low Multiplier)</option>
                <option value="medium" selected>Medium (Standard)</option>
                <option value="hard">Hard (Jackpot Mode)</option>
            </select>
        </div>
        <div class="input-group">
            <label class="label">Bet Amount</label>
            <input type="number" id="bet-amt" value="1000">
        </div>
        <div id="auto-config" style="display: none;">
            <div class="input-group">
                <label class="label">Number of Bets</label>
                <input type="number" id="auto-count" value="0">
            </div>
        </div>
        <button class="spin-btn" id="spin-btn" onclick="handleSpinClick()">Spin Wheel</button>
    </aside>

    <main class="game-area">
        <div id="result-overlay">
            <div id="result-card" class="result-card">
                <h2 id="result-title">WIN</h2>
                <p id="result-sub">+0 $</p>
            </div>
        </div>
        <div class="wheel-wrap">
            <div class="wheel-pointer"></div>
            <canvas id="wheelCanvas" width="550" height="550"></canvas>
        </div>
    </main>
</div>

<script>
    const firebaseConfig = { apiKey: "AIzaSyDNrZQJDgTITduIm62uTU1QTaDLBMZ9hws", authDomain: "donutgamba.firebaseapp.com", projectId: "donutgamba", appId: "1:785116130586:web:e7a4c72b9fed8a9efdd0a3" };
    firebase.initializeApp(firebaseConfig);
    const db = firebase.firestore();

    let user = null, uid = localStorage.getItem('dg_uid'), spinning = false, totalDeg = 0, sectors = [];
    let gameMode = 'manual', autoActive = false, betsRemaining = 0;

    function setMode(m) {
        gameMode = m; autoActive = false;
        document.getElementById('tab-manual').classList.toggle('active', m === 'manual');
        document.getElementById('tab-auto').classList.toggle('active', m === 'auto');
        document.getElementById('auto-config').style.display = (m === 'auto') ? 'block' : 'none';
        document.getElementById('spin-btn').innerText = (m === 'auto') ? 'Start Auto' : 'Spin Wheel';
    }

    function toggleWallet() {
        const modal = document.getElementById('wallet-modal');
        modal.style.display = (modal.style.display === 'flex') ? 'none' : 'flex';
    }

    function initWheel() {
        const canvas = document.getElementById('wheelCanvas'), ctx = canvas.getContext('2d');
        const segs = parseInt(document.getElementById('seg-sel').value);
        const diff = document.getElementById('diff-sel').value;
        const arc = (Math.PI * 2) / segs;
        sectors = [];

        // VYTVOŘENÍ POLÍČEK PODLE OBTÍŽNOSTI
        for(let i=0; i<segs; i++) {
            sectors.push({ mult: 0, color: '#0d131c' }); // Přednastavit vše jako prohru
        }

        if(diff === 'easy') {
            // EASY: Cca 40% políček jsou výhry 1.2x
            let winCount = Math.floor(segs * 0.4);
            for(let i=0; i<winCount; i++) {
                let idx = Math.floor(Math.random() * segs);
                while(sectors[idx].mult > 0) idx = Math.floor(Math.random() * segs);
                sectors[idx] = { mult: 1.2, color: '#2ecc71' };
            }
        } 
        else if(diff === 'medium') {
            // MEDIUM: Přesně 7 výherních políček (mix barev)
            let winCount = 7;
            for(let i=0; i<winCount; i++) {
                let idx = Math.floor(Math.random() * segs);
                while(sectors[idx].mult > 0) idx = Math.floor(Math.random() * segs);
                
                const rand = Math.random();
                if(rand > 0.8) sectors[idx] = { mult: 4.2, color: '#f1c40f' }; // Zlatá
                else if(rand > 0.4) sectors[idx] = { mult: 2.1, color: '#9b59b6' }; // Fialová
                else sectors[idx] = { mult: 1.6, color: '#3498db' }; // Modrá
            }
        } 
        else if(diff === 'hard') {
            // HARD: Přesně 2 políčka výhry (Jackpot)
            let winCount = 2;
            for(let i=0; i<winCount; i++) {
                let idx = Math.floor(Math.random() * segs);
                while(sectors[idx].mult > 0) idx = Math.floor(Math.random() * segs);
                sectors[idx] = { mult: 12.0, color: '#f1c40f' };
                sectors[idx].isHard = true; // Pro vizuální odlišení pozadí nuly
            }
            // Změna barvy proher na Hardu
            sectors.forEach(s => { if(s.mult === 0) s.color = '#3d0a0a'; });
        }

        // Vykreslení
        ctx.clearRect(0,0,550,550);
        sectors.forEach((s, i) => {
            const ang = i * arc;
            ctx.beginPath(); ctx.fillStyle = s.color; ctx.moveTo(275, 275);
            ctx.arc(275, 275, 265, ang, ang + arc); ctx.fill();
            
            ctx.save(); ctx.translate(275, 275); ctx.rotate(ang + arc/2);
            ctx.fillStyle = s.mult > 0 ? "#fff" : "rgba(255,255,255,0.15)"; 
            ctx.font = `bold ${segs > 20 ? '11px' : '15px'} sans-serif`; 
            ctx.fillText(s.mult > 0 ? s.mult + "x" : "0x", 185, 5); 
            ctx.restore();

            ctx.strokeStyle = "rgba(0,0,0,0.3)"; ctx.lineWidth = 1;
            ctx.beginPath(); ctx.moveTo(275, 275); 
            ctx.lineTo(275 + Math.cos(ang)*265, 275 + Math.sin(ang)*265); ctx.stroke();
        });
    }

    function handleSpinClick() {
        if(gameMode === 'manual') spin();
        else {
            if(autoActive) { autoActive = false; document.getElementById('spin-btn').innerText = 'Start Auto'; }
            else { betsRemaining = parseInt(document.getElementById('auto-count').value) || -1; autoActive = true; spin(); }
        }
    }

    async function spin() {
        if(spinning) return;
        const bet = parseInt(document.getElementById('bet-amt').value);
        if(!user || bet > user.balance || bet < 100) { autoActive = false; return alert("Invalid bet!"); }

        spinning = true;
        document.getElementById('spin-btn').disabled = true;
        document.getElementById('result-overlay').classList.remove('active');

        await db.collection('users').doc(uid).update({ 
            balance: firebase.firestore.FieldValue.increment(-bet),
            wagered: firebase.firestore.FieldValue.increment(bet)
        });

        const randomExtra = Math.floor(Math.random() * 360);
        totalDeg += (360 * 10) + randomExtra;
        
        document.getElementById('wheelCanvas').style.transform = `rotate(${totalDeg}deg)`;

        setTimeout(async () => {
            const actualRotation = (totalDeg % 360);
            const relativeArrowAngle = (360 - actualRotation + 270) % 360;
            const sectorSize = 360 / sectors.length;
            const winIdx = Math.floor(relativeArrowAngle / sectorSize);
            
            const multiplier = sectors[winIdx].mult;
            const winAmt = Math.floor(bet * multiplier);

            showResult(multiplier, winAmt);
            if(winAmt > 0) await db.collection('users').doc(uid).update({ balance: firebase.firestore.FieldValue.increment(winAmt) });
            
            spinning = false;
            document.getElementById('spin-btn').disabled = false;
            if(gameMode === 'auto' && autoActive) {
                if(betsRemaining > 0) betsRemaining--;
                if(betsRemaining === 0) autoActive = false;
                else setTimeout(spin, 1800);
            }
        }, 5100);
    }

    function showResult(m, amt) {
        const o = document.getElementById('result-overlay');
        document.getElementById('result-card').className = m > 0 ? "result-card win" : "result-card loss";
        document.getElementById('result-title').innerText = m > 0 ? "WINNER!" : "LOSS";
        document.getElementById('result-sub').innerText = m > 0 ? `+${amt.toLocaleString()} $` : "Try again!";
        o.classList.add('active');
        setTimeout(() => o.classList.remove('active'), 2500);
    }

    async function login() {
        const nick = document.getElementById('nick-in').value.trim();
        if(!nick) return;
        const snap = await db.collection('users').where('nick_low', '==', nick.toLowerCase()).get();
        if(snap.empty) {
            const res = await db.collection('users').add({ nick, nick_low: nick.toLowerCase(), balance: 0, wagered: 0, verified: false, vCode: Math.floor(1000 + Math.random() * 9000) });
            uid = res.id;
        } else { uid = snap.docs[0].id; }
        localStorage.setItem('dg_uid', uid);
        location.reload();
    }

    if(uid) {
        db.collection('users').doc(uid).onSnapshot(doc => {
            if(!doc.exists) return;
            user = doc.data();
            if(user.verified) {
                document.getElementById('auth-screen').style.display = 'none';
                document.getElementById('user-ui').style.display = 'flex';
                document.getElementById('u-bal').innerText = (user.balance || 0).toLocaleString() + " $";
                document.getElementById('u-head').src = `https://minotar.net/helm/${user.nick}/35`;
                const perc = Math.min(((user.wagered || 0) / 1000000) * 100, 100);
                document.getElementById('wager-fill').style.width = perc + "%";
                document.getElementById('wager-val').innerText = `$${(user.wagered || 0).toLocaleString()} / $1,000,000`;
            } else {
                document.getElementById('v-code').style.display = 'block';
                document.getElementById('v-code').innerText = `/msg tickony ${user.vCode}`;
            }
        });
    }

    async function walletAction(type) {
        const amt = parseInt(document.getElementById('wallet-amt').value);
        if(!amt || amt < 1000) return alert("Min 1000 $");
        if(type === 'deposit') {
            document.getElementById('deposit-instructions').style.display = 'block';
            document.getElementById('deposit-instructions').innerText = `/pay tickony ${amt}`;
        }
        if(type === 'withdraw' && amt > user.balance) return alert("Low balance!");
        if(type === 'withdraw') {
            if((user.wagered || 0) < 1000000) return alert("Musíš prosázet 1,000,000 $ pro výběr!");
            await db.collection('users').doc(uid).update({ balance: firebase.firestore.FieldValue.increment(-amt) });
        }
        await db.collection('requests').add({ uid, nick: user.nick, amount: amt, type, status: 'pending', timestamp: firebase.firestore.FieldValue.serverTimestamp() });
    }

    function logout() { localStorage.removeItem('dg_uid'); location.reload(); }
    initWheel();
</script>

</body>
</html>
